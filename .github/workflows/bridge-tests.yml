name: Bridge Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: bridge-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bridge-relay:
    name: Bridge Relay Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run bridge tests
        run: pnpm test:bridge

  full-flow:
    name: Full Flow E2E (best-effort)
    needs: bridge-relay
    runs-on: windows-latest
    # Chrome extensions with MV3 service workers don't reliably activate
    # on CI runners. This test is best-effort — bridge relay tests above
    # cover the core logic. This will pass when Chrome CI support improves.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm build

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run full flow test
        shell: bash
        run: |
          # Pin to the default port (must match the URL baked into the extension)
          export BRIDGE_PORT=19816
          BRIDGE="http://127.0.0.1:${BRIDGE_PORT}"

          # Start bridge in background
          node --experimental-strip-types bridge/src/index.ts &
          BRIDGE_PID=$!
          sleep 3

          # Launch Chrome with extension loaded (Windows has a real display)
          # --user-data-dir is required on Windows for --remote-debugging-port
          CHROME_DATA=$(mktemp -d)
          chrome.exe \
            --no-first-run \
            --no-default-browser-check \
            --user-data-dir="$(cygpath -w "$CHROME_DATA")" \
            --remote-debugging-port=9222 \
            --disable-extensions-except="$(cygpath -w "$PWD/dist")" \
            --load-extension="$(cygpath -w "$PWD/dist")" \
            about:blank &
          CHROME_PID=$!
          sleep 10

          # Verify bridge is up
          curl -sf $BRIDGE/health || { echo "Bridge not running"; exit 1; }

          # Poke CDP to check if extension loaded, and list targets for debug
          echo "CDP targets:"
          curl -sf http://127.0.0.1:9222/json 2>/dev/null | python3 -c "
          import sys,json
          targets = json.load(sys.stdin)
          for t in targets:
              print(f'  [{t[\"type\"]}] {t[\"url\"][:80]}')
          " || echo "  (CDP not available)"

          # Navigate to a page to help activate the service worker
          curl -sf http://127.0.0.1:9222/json/new?about:blank > /dev/null 2>&1 || true
          sleep 3

          # Wait for extension to connect (up to 45s)
          CONNECTED=False
          for i in $(seq 1 45); do
            CONNECTED=$(curl -sf $BRIDGE/health | python3 -c "import sys,json; print(json.load(sys.stdin).get('chromeConnected', False))")
            if [ "$CONNECTED" = "True" ]; then
              echo "Extension connected after ${i}s"
              break
            fi
            sleep 1
          done

          if [ "$CONNECTED" != "True" ]; then
            echo "Extension did not connect within 45s"

            # Debug: dump CDP targets
            echo "CDP targets at failure:"
            curl -sf http://127.0.0.1:9222/json 2>/dev/null | python3 -c "import sys,json; [print(f'  [{t[\"type\"]}] {t[\"url\"][:100]}') for t in json.load(sys.stdin)]" || true

            # Debug: try to read service worker console via CDP
            echo "Attempting to read extension console..."
            SW_WS=$(curl -sf http://127.0.0.1:9222/json 2>/dev/null | python3 -c "
            import sys,json
            for t in json.load(sys.stdin):
                if 'chrome-extension' in t.get('url',''):
                    print(t.get('webSocketDebuggerUrl',''))
                    break
            " 2>/dev/null)
            if [ -n "$SW_WS" ]; then
              echo "  Extension target WS: $SW_WS"
            fi

            # Debug: check if bridge port is reachable
            echo "Bridge health: $(curl -sf $BRIDGE/health || echo 'unreachable')"
            curl -sf $BRIDGE/health || true
            taskkill //F //PID $CHROME_PID 2>/dev/null; kill $BRIDGE_PID 2>/dev/null
            exit 1
          fi

          # Test: commands are synced
          COMMANDS=$(curl -sf $BRIDGE/commands)
          CMD_COUNT=$(echo "$COMMANDS" | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('commands', [])))")
          echo "Synced commands: $CMD_COUNT"
          if [ "$CMD_COUNT" -lt 1 ]; then
            echo "No commands synced"
            taskkill //F //PID $CHROME_PID 2>/dev/null; kill $BRIDGE_PID 2>/dev/null
            exit 1
          fi

          # Test: execute a command (toggle-theme)
          EXEC=$(curl -sf -X POST $BRIDGE/execute \
            -H "Content-Type: application/json" \
            -d '{"commandId":"toggle-theme"}')
          echo "Execute result: $EXEC"
          echo "$EXEC" | python3 -c "import sys,json; assert json.load(sys.stdin).get('ok'), 'execute failed'"

          # Test: search bookmarks (relay roundtrip — result may be empty)
          SEARCH_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$BRIDGE/search-bookmarks?q=test")
          echo "Search bookmarks status: $SEARCH_STATUS"
          if [ "$SEARCH_STATUS" != "200" ]; then
            echo "Bookmark search failed with status $SEARCH_STATUS"
            taskkill //F //PID $CHROME_PID 2>/dev/null; kill $BRIDGE_PID 2>/dev/null
            exit 1
          fi

          echo "All full-flow tests passed!"
          taskkill //F //PID $CHROME_PID 2>/dev/null; kill $BRIDGE_PID 2>/dev/null
          exit 0
